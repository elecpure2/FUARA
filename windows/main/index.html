<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUARA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">FUARA</h1>
        <button class="btn-icon" id="btn-add-project" title="프로젝트 추가">+</button>
      </div>
      <div class="sidebar-section">
        <button class="sidebar-item active" data-view="todo">
          <span class="sidebar-icon">&#9776;</span> To-Do
        </button>
        <button class="sidebar-item" data-view="schedule">
          <span class="sidebar-icon">&#128339;</span> 스케줄
        </button>
        <button class="sidebar-item" data-view="calendar">
          <span class="sidebar-icon">&#9635;</span> 캘린더
        </button>
        <button class="sidebar-item" data-view="notes">
          <span class="sidebar-icon">&#9998;</span> 노트
        </button>
        <button class="sidebar-item" data-view="hub">
          <span class="sidebar-icon">&#9783;</span> Hub
        </button>
        <button class="sidebar-item" data-view="misc">
          <span class="sidebar-icon">&#9874;</span> 기타
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <span class="sidebar-label">프로젝트</span>
        <div id="project-list"></div>
      </div>
    </aside>

    <main class="content">
      <header class="content-header">
        <div class="header-title-row">
          <button class="header-date-btn" id="btn-date-prev" title="이전 날짜/월">&#9664;</button>
          <h2 id="view-title">To-Do</h2>
          <button class="header-date-btn" id="btn-date-next" title="다음 날짜/월">&#9654;</button>
        </div>
        <div class="header-actions">
          <input type="date" id="date-picker" class="date-picker" />
        </div>
      </header>

      <div class="sub-tab-bar" id="sub-tab-bar">
        <button class="sub-tab active" data-subtab="today">오늘</button>
        <button class="sub-tab" data-subtab="all">전체</button>
      </div>

      <div class="in-progress-section hidden" id="in-progress-section"></div>
      <div class="hub-view hidden" id="hub-view"></div>
      <div class="misc-view hidden" id="misc-view"></div>
      <div class="task-list" id="task-list"></div>
      <div class="calendar-view hidden" id="calendar-view"></div>
      <div class="notes-view hidden" id="notes-view"></div>
      <div class="sched-motivation hidden" id="sched-motivation"></div>
      <div class="schedule-view hidden" id="schedule-view"></div>

      <div class="add-task-bar">
        <input type="text" id="new-task-title" placeholder="새 작업 추가..." class="task-input" />
        <select id="new-task-priority" class="priority-select">
          <option value="normal">보통</option>
          <option value="must">필수</option>
          <option value="low">낮음</option>
        </select>
        <input type="number" id="new-task-estimate" placeholder="분" class="estimate-input" min="0" />
        <button class="btn-add-task" id="btn-add-task">추가</button>
      </div>

      <div class="add-schedule-bar hidden">
        <div class="add-schedule-row">
          <input type="text" id="new-schedule-title" placeholder="새 스케줄 추가..." class="task-input" />
          <div class="sched-date-picker-wrap">
            <button type="button" class="sched-date-btn" id="new-schedule-date-btn"></button>
            <div class="sched-cal-dropdown hidden" id="sched-cal-dropdown"></div>
          </div>
          <input type="text" id="new-schedule-start" class="time-input-custom" placeholder="00:00" maxlength="5" />
          <span class="time-separator">~</span>
          <input type="text" id="new-schedule-end" class="time-input-custom" placeholder="미정" maxlength="5" />
          <select id="new-schedule-recurrence" class="priority-select">
            <option value="none">반복 안 함</option>
            <option value="daily">매일</option>
            <option value="weekly">매주</option>
          </select>
          <button class="btn-add-task" id="btn-add-schedule">추가</button>
        </div>
        <div class="recurrence-days-row hidden" id="recurrence-days-row">
          <span class="recurrence-days-label">반복 요일:</span>
          <button class="day-btn" data-day="0">일</button>
          <button class="day-btn" data-day="1">월</button>
          <button class="day-btn" data-day="2">화</button>
          <button class="day-btn" data-day="3">수</button>
          <button class="day-btn" data-day="4">목</button>
          <button class="day-btn" data-day="5">금</button>
          <button class="day-btn" data-day="6">토</button>
        </div>
        <label class="schedule-allocation-toggle">
          <input type="checkbox" id="new-schedule-counts-allocation" checked />
          <span>할당 시간에 포함</span>
        </label>
        <div class="schedule-quick-tags hidden" id="new-schedule-quick-tags"></div>
      </div>

      <footer class="status-bar">
        <span id="status-info">작업 0개</span>
      </footer>
    </main>
  </div>

  <div class="modal-overlay hidden" id="project-modal">
    <div class="modal">
      <h3>프로젝트 추가</h3>
      <input type="text" id="project-name" placeholder="프로젝트 이름" class="modal-input" />
      <input type="text" id="project-path" placeholder="폴더 경로 (선택)" class="modal-input" />
      <input type="text" id="project-tech" placeholder="기술 스택 (선택)" class="modal-input" />
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel-project">취소</button>
        <button class="btn-confirm" id="btn-confirm-project">추가</button>
      </div>
    </div>
  </div>

  <script src="renderer.bundle.js"></script>
  <script src="misc-view.js"></script>
</body>

</html>
